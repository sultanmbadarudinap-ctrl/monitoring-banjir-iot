<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Monitoring Banjir IoT</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* 1. MENGUBAH WARNA LATAR BELAKANG HALAMAN UTAMA MENJADI BIRU MUDA */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e3f2fd; /* Biru muda yang lembut dan adem di mata */
            margin: 0;
            padding: 25px;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: #0d47a1;
            margin: 0;
            font-size: 2.2rem;
        }

        header p {
            color: #546e7a;
            margin: 5px 0 0 0;
        }

        /* Desain Grid Kotak Monitoring Data Real-time */
        .grid-monitoring {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.04);
            text-align: center;
            border: 1px solid #bbdefb;
        }

        .card h3 {
            margin: 0 0 10px 0;
            color: #546e7a;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card p {
            font-size: 2.3rem;
            font-weight: bold;
            margin: 0;
            color: #0288d1;
        }

        /* 2. MENGUBAH BAGIAN WADAH RIWAYAT MENJADI WARNA PUTIH */
        .riwayat-section {
            background-color: #ffffff; /* Sesuai request: Berwarna Putih */
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid #e0e0e0;
        }

        .riwayat-section h2 {
            margin-top: 0;
            color: #0d47a1;
            border-bottom: 2px solid #e3f2fd;
            padding-bottom: 12px;
            font-size: 1.5rem;
        }

        /* Desain Tabel Log Data */
        .table-responsive {
            overflow-x: auto;
            margin-top: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }

        th {
            background-color: #f8f9fa;
            color: #546e7a;
            font-weight: 600;
        }

        tr:hover {
            background-color: #fbfbfb;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Sistem Deteksi Banjir Berbasis IoT & ANN</h1>
            <p>Data Monitoring Real-time Terintegrasi Cloud Firebase</p>
        </header>

        <div class="grid-monitoring">
            <div class="card">
                <h3>Ketinggian Air</h3>
                <p id="txtJarak">--- cm</p>
            </div>
            <div class="card">
                <h3>Debit Aliran Air</h3>
                <p id="txtDebit">--- L/m</p>
            </div>
            <div class="card">
                <h3>Status Kebencanaan</h3>
                <p id="txtStatus" style="color: #757575;">MENCARI...</p>
            </div>
        </div>

        <div class="riwayat-section">
            <h2>Riwayat Aktivitas Log (Tanpa Delay)</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Waktu Transmisi</th>
                            <th>Ketinggian Air (Jarak)</th>
                            <th>Debit Aliran</th>
                            <th>Status Siaga</th>
                        </tr>
                    </thead>
                    <tbody id="bodyTabelRiwayat">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ====================================================================
        // SILAKAN TEMPEL KONFIGURASI WEB API FIREBASE MILIKMU DI SINI
        // ====================================================================
        const firebaseConfig = {
            apiKey: "API_KEY_FIREBASE_ANDA",
            authDomain: "NAMA_PROJECT_ANDA.firebaseapp.com",
            databaseURL: "https://NAMA_PROJECT_ANDA-default-rtdb.firebaseio.com",
            projectId: "NAMA_PROJECT_ANDA",
            storageBucket: "NAMA_PROJECT_ANDA.appspot.com",
            messagingSenderId: "SENDER_ID_ANDA",
            appId: "APP_ID_ANDA"
        };

        // Inisialisasi Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ====================================================================
        // AMBIL DATA TERBARU DARI NODE PUSH /RIWAYAT_MONITORING
        // ====================================================================
        db.ref('/riwayat_monitoring').limitToLast(1).on('child_added', (snapshot) => {
            const data = snapshot.val();
            
            if (data) {
                // --- A. UPDATE TAMPILAN ELEMEN CARD SECARA REAL-TIME ---
                if(document.getElementById("txtJarak")) {
                    document.getElementById("txtJarak").innerText = data.jarak == -1.0 ? "--- cm" : data.jarak.toFixed(1) + " cm";
                }
                if(document.getElementById("txtDebit")) {
                    document.getElementById("txtDebit").innerText = data.debit.toFixed(1) + " L/m";
                }
                
                const elStatus = document.getElementById("txtStatus");
                if(elStatus) {
                    elStatus.innerText = data.status;
                    if (data.status === "BAHAYA") { elStatus.style.color = "red"; }
                    else if (data.status === "WASPADA") { elStatus.style.color = "orange"; }
                    else if (data.status === "AMAN") { elStatus.style.color = "green"; }
                    else { elStatus.style.color = "#757575"; }
                }

                // --- B. STRUKTUR FORMAT WAKTU OPERASIONAL (JAM LOKAL) ---
                const sekarang = new Date();
                const jam = sekarang.getHours().toString().padStart(2, '0');
                const menit = sekarang.getMinutes().toString().padStart(2, '0');
                const detik = sekarang.getSeconds().toString().padStart(2, '0');
                const waktuFormat = `${jam}:${menit}:${detik}`;

                // --- C. MEMASUKKAN BARIS SECARA INSTAN KE TABEL RIWAYAT ---
                const tabel = document.getElementById("bodyTabelRiwayat");
                
                if (tabel) {
                    const barisBaru = tabel.insertRow(0); // Tambah data di baris teratas

                    // Isi Kolom Tabel
                    barisBaru.insertCell(0).innerText = waktuFormat;
                    barisBaru.insertCell(1).innerText = data.jarak == -1.0 ? "--- cm (Blind Spot)" : data.jarak.toFixed(1) + " cm";
                    barisBaru.insertCell(2).innerText = data.debit.toFixed(1) + " L/menit";
                    
                    const cellStatus = barisBaru.insertCell(3);
                    cellStatus.innerText = data.status;
                    
                    // Modifikasi Style Warna Status di Tabel Riwayat
                    if (data.status === "BAHAYA") { 
                        cellStatus.style.color = "red"; 
                        cellStatus.style.fontWeight = "bold";
                    } else if (data.status === "WASPADA") { 
                        cellStatus.style.color = "orange"; 
                        cellStatus.style.fontWeight = "bold";
                    } else { 
                        cellStatus.style.color = "green"; 
                    }
                }
            }
        });
    </script>
</body>
</html>
